<!DOCTYPE html>
<html>
<head>
    <title>BSharp Audio Generator</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        button { font-size: 18px; padding: 10px 20px; margin: 10px 5px; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { font-size: 18px; margin: 15px 0; font-weight: bold; }
        #progress { color: #666; margin: 10px 0; }
        .section { border: 1px solid #ccc; border-radius: 8px; padding: 15px; margin: 15px 0; }
        h2 { margin-top: 0; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>BSharp Audio Generator</h1>
    <p>Generates piano audio files using Tone.js offline rendering. Files download as WAV, then convert to MP3 with ffmpeg.</p>

    <div class="section">
        <h2>Chords (14 chords &times; 3 durations = 42 files)</h2>
        <button id="chordsButton">Generate Chords</button>
    </div>

    <div class="section">
        <h2>Single Notes (18 notes &times; 3 durations = 54 files)</h2>
        <button id="notesButton">Generate Notes</button>
    </div>

    <div class="section">
        <h2>All Audio (96 files total)</h2>
        <button id="allButton">Generate All</button>
    </div>

    <div id="status"></div>
    <div id="progress"></div>
    <div id="results"></div>

    <script src="vendor/Tone.js"></script>
    <script>
        const DURATIONS = {
            short: 1.0,
            medium: 1.75,
            long: 2.5
        };

        const noteToLetter = {
            'C': 'c', 'C#': 'cs', 'Db': 'cs',
            'D': 'd', 'D#': 'ds', 'Eb': 'ds',
            'E': 'e',
            'F': 'f', 'F#': 'fs', 'Gb': 'fs',
            'G': 'g', 'G#': 'gs', 'Ab': 'gs',
            'A': 'a', 'A#': 'as', 'Bb': 'as',
            'B': 'h'
        };

        const CHORDS = [
            { name: "red", chord: "C", notes: ["C4", "E4", "G4"] },
            { name: "yellow", chord: "F/C", notes: ["C4", "F4", "A4"] },
            { name: "blue", chord: "G/B", notes: ["B3", "D4", "G4"] },
            { name: "black", chord: "F/A", notes: ["A3", "C4", "F4"] },
            { name: "green", chord: "G/D", notes: ["D4", "G4", "B4"] },
            { name: "orange", chord: "C/E", notes: ["E4", "G4", "C5"] },
            { name: "purple", chord: "F", notes: ["F4", "A4", "C5"] },
            { name: "pink", chord: "G", notes: ["G4", "B4", "D5"] },
            { name: "brown", chord: "C/G", notes: ["G4", "C5", "E5"] },
            { name: "gray", chord: "A", notes: ["A3", "C#4", "E4"] },
            { name: "tan", chord: "D", notes: ["D4", "F#4", "A4"] },
            { name: "lightgreen", chord: "E", notes: ["E4", "G#4", "B4"] },
            { name: "lightpurple", chord: "Bb", notes: ["Bb3", "D4", "F4"] },
            { name: "skyblue", chord: "Eb", notes: ["Eb4", "G4", "Bb4"] }
        ];

        // All unique notes across all 14 chords
        const SINGLE_NOTES = [
            "A3", "Bb3", "B3",
            "C4", "C#4", "D4", "Eb4", "E4", "F4", "F#4", "G4", "G#4",
            "A4", "Bb4", "B4",
            "C5", "D5", "E5"
        ];

        // Piano sample map
        const actualSamples = {
            "A3": "A3v11.mp3",
            "C3": "C3v11.mp3",
            "D#3": "DSharp3v11.mp3",
            "F#3": "FSharp3v11.mp3",
            "A4": "A4v11.mp3",
            "C4": "C4v11.mp3",
            "D#4": "DSharp4v11.mp3",
            "F#4": "FSharp4v11.mp3",
            "A5": "A5v11.mp3",
            "C5": "C5v11.mp3",
            "D#5": "DSharp5v11.mp3",
            "F#5": "FSharp5v11.mp3",
            "A6": "A6v11.mp3",
            "C6": "C6v11.mp3"
        };

        const statusDiv = document.getElementById('status');
        const progressDiv = document.getElementById('progress');
        const resultsDiv = document.getElementById('results');
        let generatedFiles = [];

        function noteName(note) {
            return noteToLetter[note.replace(/\d+$/, '')];
        }

        function noteFilename(note) {
            const octave = note.match(/\d+$/)[0];
            return noteName(note) + octave;
        }

        // --- Render audio with Tone.js offline ---

        async function renderAudio(notes, duration) {
            const buffer = await Tone.Offline(async () => {
                const sampler = new Tone.Sampler({
                    urls: actualSamples,
                    baseUrl: "samples/piano_1/",
                    release: 1
                }).toDestination();

                await Tone.loaded();
                sampler.triggerAttackRelease(notes, duration);
            }, duration + 0.5);
            return buffer;
        }

        function downloadWav(buffer, filename) {
            const blob = audioBufferToWav(buffer);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // --- Chord generation ---

        async function generateChord(color, notes, durationKey, duration) {
            const notesPrefix = notes.map(n => noteName(n)).join('');
            const filename = `${notesPrefix}_${color}_${durationKey}.wav`;
            progressDiv.textContent = `Chord: ${filename} (${duration}s)`;

            const buffer = await renderAudio(notes, duration);
            downloadWav(buffer, filename);
            generatedFiles.push(filename);
            await new Promise(r => setTimeout(r, 100));
        }

        async function generateAllChords() {
            let count = 0;
            const total = CHORDS.length * Object.keys(DURATIONS).length;
            for (const chord of CHORDS) {
                for (const [dk, dur] of Object.entries(DURATIONS)) {
                    await generateChord(chord.name, chord.notes, dk, dur);
                    count++;
                    console.log(`Chords: ${count}/${total}`);
                }
            }
        }

        // --- Single note generation ---

        async function generateNote(note, durationKey, duration) {
            const prefix = noteFilename(note);
            const filename = `${prefix}_${durationKey}.wav`;
            progressDiv.textContent = `Note: ${filename} (${duration}s)`;

            const buffer = await renderAudio([note], duration);
            downloadWav(buffer, filename);
            generatedFiles.push(filename);
            await new Promise(r => setTimeout(r, 100));
        }

        async function generateAllNotes() {
            let count = 0;
            const total = SINGLE_NOTES.length * Object.keys(DURATIONS).length;
            for (const note of SINGLE_NOTES) {
                for (const [dk, dur] of Object.entries(DURATIONS)) {
                    await generateNote(note, dk, dur);
                    count++;
                    console.log(`Notes: ${count}/${total}`);
                }
            }
        }

        // --- UI ---

        function setButtons(disabled) {
            document.getElementById('chordsButton').disabled = disabled;
            document.getElementById('notesButton').disabled = disabled;
            document.getElementById('allButton').disabled = disabled;
        }

        function showResults(label) {
            statusDiv.textContent = `Done! Generated ${generatedFiles.length} ${label} files.`;
            progressDiv.textContent = '';
            resultsDiv.innerHTML = `
                <h2>Generated Files (${generatedFiles.length}):</h2>
                <pre>${generatedFiles.join('\n')}</pre>
                <h2>Next Steps:</h2>
                <ol>
                    <li>Move chord WAVs: <pre>make move-downloaded-chords</pre></li>
                    <li>Move note WAVs: <pre>make move-downloaded-notes</pre></li>
                    <li>Convert all to MP3: <pre>make convert-audio-to-mp3</pre></li>
                </ol>
            `;
        }

        async function run(genFn, label) {
            setButtons(true);
            generatedFiles = [];
            statusDiv.textContent = `Generating ${label}...`;
            await Tone.start();
            await genFn();
            showResults(label);
            setButtons(false);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('chordsButton').addEventListener('click', () => run(generateAllChords, 'chord'));
            document.getElementById('notesButton').addEventListener('click', () => run(generateAllNotes, 'note'));
            document.getElementById('allButton').addEventListener('click', () => run(async () => {
                await generateAllChords();
                await generateAllNotes();
            }, 'audio'));
        });

        // --- WAV encoder ---

        function audioBufferToWav(audioBuffer) {
            const numChannels = audioBuffer.numberOfChannels;
            const sampleRate = audioBuffer.sampleRate;
            const format = 1;
            const bitDepth = 16;
            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;

            const data = [];
            for (let i = 0; i < audioBuffer.length; i++) {
                for (let channel = 0; channel < numChannels; channel++) {
                    const sample = audioBuffer.getChannelData(channel)[i];
                    const s = Math.max(-1, Math.min(1, sample));
                    data.push(s < 0 ? s * 0x8000 : s * 0x7FFF);
                }
            }

            const dataLength = data.length * bytesPerSample;
            const buffer = new ArrayBuffer(44 + dataLength);
            const view = new DataView(buffer);

            function writeString(view, offset, string) {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            }

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);

            let offset = 44;
            for (let i = 0; i < data.length; i++) {
                view.setInt16(offset, data[i], true);
                offset += 2;
            }

            return new Blob([buffer], { type: 'audio/wav' });
        }
    </script>
</body>
</html>
